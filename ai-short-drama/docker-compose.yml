name: ai-short-drama
services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DRAMA_DB: ${DRAMA_DB:-short_drama}
      TZ: ${TZ:-Asia/Taipei}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/bootstrap.sh:/docker-entrypoint-initdb.d/00-bootstrap.sh:ro
      - ./database/init.sql:/opt/drama/init.sql:ro
      - ./database/02-script-storyboard.sql:/opt/drama/02-script-storyboard.sql:ro
      - ./database/03-visual-assets-images.sql:/opt/drama/03-visual-assets-images.sql:ro
      - ./database/04-video-audio.sql:/opt/drama/04-video-audio.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2.5-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  media:
    image: nginx:1.27.0-alpine
    restart: unless-stopped
    ports:
      - "${MEDIA_PORT:-8088}:80"
    volumes:
      - ./storage:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:v1.74.9-stable
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      GLM_API_KEY: ${GLM_API_KEY}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 15s
      timeout: 5s
      retries: 12

  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n-ffmpeg
      args:
        N8N_VERSION: 2.4.4
        FFMPEG_VERSION: 7.1.1
    image: ai-short-drama-n8n:2.4.4-ffmpeg7.1.1
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Taipei}
      TZ: ${TZ:-Asia/Taipei}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      NODE_FUNCTION_ALLOW_BUILTIN: crypto,fs,path
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      TEXT_ANALYSIS_MODEL: ${TEXT_ANALYSIS_MODEL:-glm-5.2}
      STORY_BIBLE_MODEL: ${STORY_BIBLE_MODEL:-glm-5.2}
      EPISODE_PLANNING_MODEL: ${EPISODE_PLANNING_MODEL:-glm-5.2}
      SCRIPT_WRITING_MODEL: ${SCRIPT_WRITING_MODEL:-glm-5.2}
      STORYBOARD_MODEL: ${STORYBOARD_MODEL:-glm-5.2}
      EPISODE_PLAN_TEMPERATURE: ${EPISODE_PLAN_TEMPERATURE:-0.5}
      SCRIPT_TEMPERATURE: ${SCRIPT_TEMPERATURE:-0.75}
      STORYBOARD_TEMPERATURE: ${STORYBOARD_TEMPERATURE:-0.4}
      MODEL_REQUEST_TIMEOUT_SECONDS: ${MODEL_REQUEST_TIMEOUT_SECONDS:-180}
      SCRIPT_DURATION_TOLERANCE_PERCENT: ${SCRIPT_DURATION_TOLERANCE_PERCENT:-15}
      SHOT_MIN_DURATION_SECONDS: ${SHOT_MIN_DURATION_SECONDS:-2}
      SHOT_MAX_DURATION_SECONDS: ${SHOT_MAX_DURATION_SECONDS:-6}
      TEST_MAX_EPISODES: ${TEST_MAX_EPISODES:-1}
      TEST_MAX_SHOTS: ${TEST_MAX_SHOTS:-10}
      ALLOW_PARTIAL_SOURCE: ${ALLOW_PARTIAL_SOURCE:-false}
      VISUAL_PROMPT_MODEL: ${VISUAL_PROMPT_MODEL:-glm-5.2}
      IMAGE_QC_MODEL: ${IMAGE_QC_MODEL:-}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-mock}
      IMAGE_MODEL: ${IMAGE_MODEL:-mock-image-model}
      IMAGE_API_BASE_URL: ${IMAGE_API_BASE_URL:-}
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      IMAGE_PROVIDER_MODE: ${IMAGE_PROVIDER_MODE:-sync}
      IMAGE_REQUEST_TIMEOUT_SECONDS: ${IMAGE_REQUEST_TIMEOUT_SECONDS:-180}
      IMAGE_MAX_RETRIES: ${IMAGE_MAX_RETRIES:-3}
      IMAGE_MAX_CONCURRENCY: ${IMAGE_MAX_CONCURRENCY:-2}
      IMAGE_REQUEST_INTERVAL_MS: ${IMAGE_REQUEST_INTERVAL_MS:-1000}
      IMAGE_POLL_INTERVAL_SECONDS: ${IMAGE_POLL_INTERVAL_SECONDS:-10}
      IMAGE_MAX_POLL_COUNT: ${IMAGE_MAX_POLL_COUNT:-30}
      IMAGE_MAX_WAIT_MINUTES: ${IMAGE_MAX_WAIT_MINUTES:-10}
      IMAGE_POLLER_BATCH_SIZE: ${IMAGE_POLLER_BATCH_SIZE:-10}
      IMAGE_DEFAULT_WIDTH: ${IMAGE_DEFAULT_WIDTH:-1024}
      IMAGE_DEFAULT_HEIGHT: ${IMAGE_DEFAULT_HEIGHT:-1792}
      IMAGE_DEFAULT_ASPECT_RATIO: ${IMAGE_DEFAULT_ASPECT_RATIO:-9:16}
      IMAGE_CANDIDATE_COUNT: ${IMAGE_CANDIDATE_COUNT:-2}
      TEST_MAX_CHARACTERS: ${TEST_MAX_CHARACTERS:-2}
      TEST_MAX_LOCATIONS: ${TEST_MAX_LOCATIONS:-2}
      TEST_MAX_ASSETS_PER_ENTITY: ${TEST_MAX_ASSETS_PER_ENTITY:-2}
      TEST_MAX_IMAGE_SHOTS: ${TEST_MAX_IMAGE_SHOTS:-10}
      REQUIRE_LOCKED_ASSETS: ${REQUIRE_LOCKED_ASSETS:-true}
      AUTO_QC_ENABLED: ${AUTO_QC_ENABLED:-true}
      VIDEO_PROMPT_MODEL: ${VIDEO_PROMPT_MODEL:-glm-5.2}
      VIDEO_QC_MODEL: ${VIDEO_QC_MODEL:-}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      VIDEO_MODEL: ${VIDEO_MODEL:-mock-image-to-video}
      VIDEO_API_BASE_URL: ${VIDEO_API_BASE_URL:-}
      VIDEO_API_KEY: ${VIDEO_API_KEY:-}
      VIDEO_PROVIDER_MODE: ${VIDEO_PROVIDER_MODE:-async}
      VIDEO_REQUEST_TIMEOUT_SECONDS: ${VIDEO_REQUEST_TIMEOUT_SECONDS:-180}
      VIDEO_MAX_RETRIES: ${VIDEO_MAX_RETRIES:-3}
      VIDEO_MAX_CONCURRENCY: ${VIDEO_MAX_CONCURRENCY:-2}
      VIDEO_REQUEST_INTERVAL_MS: ${VIDEO_REQUEST_INTERVAL_MS:-1000}
      VIDEO_POLL_INTERVAL_SECONDS: ${VIDEO_POLL_INTERVAL_SECONDS:-15}
      VIDEO_MAX_POLL_COUNT: ${VIDEO_MAX_POLL_COUNT:-60}
      VIDEO_MAX_WAIT_MINUTES: ${VIDEO_MAX_WAIT_MINUTES:-30}
      VIDEO_POLLER_BATCH_SIZE: ${VIDEO_POLLER_BATCH_SIZE:-5}
      VIDEO_DEFAULT_DURATION_SECONDS: ${VIDEO_DEFAULT_DURATION_SECONDS:-5}
      VIDEO_DEFAULT_ASPECT_RATIO: ${VIDEO_DEFAULT_ASPECT_RATIO:-9:16}
      VIDEO_DEFAULT_RESOLUTION: ${VIDEO_DEFAULT_RESOLUTION:-1080x1920}
      VIDEO_DEFAULT_FPS: ${VIDEO_DEFAULT_FPS:-24}
      VIDEO_DURATION_TOLERANCE_PERCENT: ${VIDEO_DURATION_TOLERANCE_PERCENT:-20}
      TEST_MAX_VIDEO_SHOTS: ${TEST_MAX_VIDEO_SHOTS:-10}
      TTS_PROVIDER: ${TTS_PROVIDER:-mock}
      TTS_MODEL: ${TTS_MODEL:-mock-tts}
      TTS_API_BASE_URL: ${TTS_API_BASE_URL:-}
      TTS_API_KEY: ${TTS_API_KEY:-}
      TTS_PROVIDER_MODE: ${TTS_PROVIDER_MODE:-sync}
      TTS_REQUEST_TIMEOUT_SECONDS: ${TTS_REQUEST_TIMEOUT_SECONDS:-120}
      TTS_MAX_RETRIES: ${TTS_MAX_RETRIES:-3}
      TTS_MAX_CONCURRENCY: ${TTS_MAX_CONCURRENCY:-3}
      TTS_REQUEST_INTERVAL_MS: ${TTS_REQUEST_INTERVAL_MS:-500}
      TTS_POLL_INTERVAL_SECONDS: ${TTS_POLL_INTERVAL_SECONDS:-10}
      TTS_MAX_POLL_COUNT: ${TTS_MAX_POLL_COUNT:-30}
      TTS_MAX_WAIT_MINUTES: ${TTS_MAX_WAIT_MINUTES:-10}
      TTS_DEFAULT_LANGUAGE: ${TTS_DEFAULT_LANGUAGE:-zh-CN}
      TTS_DEFAULT_FORMAT: ${TTS_DEFAULT_FORMAT:-wav}
      TTS_DEFAULT_SAMPLE_RATE: ${TTS_DEFAULT_SAMPLE_RATE:-48000}
      TTS_TARGET_LOUDNESS_LUFS: ${TTS_TARGET_LOUDNESS_LUFS:--16}
      TTS_MAX_PEAK_DB: ${TTS_MAX_PEAK_DB:--1}
      TTS_MAX_TEXT_LENGTH: ${TTS_MAX_TEXT_LENGTH:-500}
      DEFAULT_NARRATOR_VOICE_ID: ${DEFAULT_NARRATOR_VOICE_ID:-}
      TEST_MAX_DIALOGUES: ${TEST_MAX_DIALOGUES:-30}
      MEDIA_STORAGE_MODE: ${MEDIA_STORAGE_MODE:-local}
      MEDIA_STORAGE_PATH: /data/storage
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:8088}
      MEDIA_PROCESSING_ENABLED: ${MEDIA_PROCESSING_ENABLED:-true}
      FFMPEG_PATH: ${FFMPEG_PATH:-ffmpeg}
      FFPROBE_PATH: ${FFPROBE_PATH:-ffprobe}
      MEDIA_MAX_DOWNLOAD_MB: ${MEDIA_MAX_DOWNLOAD_MB:-500}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      MOCK_MODE: ${MOCK_MODE:-true}
      CHUNK_MAX_CHARS: ${CHUNK_MAX_CHARS:-12000}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-500}
      MODEL_MAX_TOKENS: ${MODEL_MAX_TOKENS:-4096}
      MODEL_TIMEOUT_MS: ${MODEL_TIMEOUT_MS:-120000}
      MODEL_MAX_RETRIES: ${MODEL_MAX_RETRIES:-3}
      ALLOW_PARTIAL_STORY_BIBLE: ${ALLOW_PARTIAL_STORY_BIBLE:-false}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./storage:/data/storage
      - ./test-data:/data/test-data:ro
      - ./workflows:/data/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:5678/healthz >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  redis_data:
  n8n_data:
